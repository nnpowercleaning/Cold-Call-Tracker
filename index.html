<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N&N Powercleaning — Cold Call Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #ededeb;
    --text: #1a1a1a; --text2: #595959; --text3: #8a8a8a;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue: #378ADD; --blue-light: #B5D4F4; --blue-dark: #0C447C;
    --green: #3B6D11; --green-light: #EAF3DE;
    --amber: #854F0B; --amber-light: #FAEEDA;
    --red: #A32D2D; --red-light: #FCEBEB;
    --gray-light: #F1EFE8; --gray: #5F5E5A;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; }
  .app { max-width: 1200px; margin: 0 auto; padding: 0 0 40px; }

  /* header, metrics, cards, table, badges, two-col, charts, tips, checklist ... */
  /* Reuse all your CSS above (too long to paste fully) */
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-title">N&amp;N Powercleaning — Cold Call Dashboard</div>
      <div class="header-sub">Northwest Indiana · Schererville, IL</div>
    </div>
    <div class="header-right">
      <span class="save-notice" id="save-notice">Saved!</span>
      <span class="date-display" id="date-display"></span>
      <button class="reset-btn" onclick="resetDay()">Reset Today</button>
      <button class="reset-btn" onclick="clearAll()">Clear All Data</button>
    </div>
  </div>

  <div class="content">
    <!-- Include all sections from your HTML: metrics, goals, log a call, follow-up queue, charts, call script, objections, pro tips, checklist ... -->
    <!-- For brevity, reuse your existing HTML code above for these sections -->
  </div>
</div>

<script>
const STORAGE_KEY = 'nn_dashboard_v2';
let state = {
  calls: [],
  followUps: [
    { id: 1, name: 'Sample: Mike T. — Merrillville', detail: 'Quote sent $225 · house wash', due: 'today' },
    { id: 2, name: 'Sample: Linda K. — Schererville', detail: 'Callback requested · driveway', due: 'tomorrow' },
    { id: 3, name: 'Sample: Park Mgmt Co.', detail: 'Quote $480 · commercial lot', due: '3days' },
  ],
  allTimeCalls: 0,
  allTimeBooked: 0,
  weekData: { Mon:0, Tue:0, Wed:0, Thu:0, Fri:0, Sat:0, Sun:0 },
  weekQuotes: { Mon:0, Tue:0, Wed:0, Thu:0, Fri:0, Sat:0, Sun:0 },
  nextFuId: 4,
};

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const n = document.getElementById('save-notice');
  n.style.display = 'inline';
  setTimeout(() => n.style.display = 'none', 1500);
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { state = { ...state, ...JSON.parse(raw) }; } catch(e) {}
  }
}

function getToday() {
  const d = new Date();
  const options = { weekday:'long', month:'long', day:'numeric' };
  document.getElementById('date-display').textContent = d.toLocaleDateString(undefined, options);
  return d.toISOString().split('T')[0];
}

function todayCalls() { return state.calls.filter(c => c.date === getToday()); }

function addCall() {
  const name = document.getElementById('in-name').value.trim();
  const phone = document.getElementById('in-phone').value.trim();
  const area = document.getElementById('in-area').value.trim();
  const result = document.getElementById('in-result').value;
  const temp = document.getElementById('in-temp').value;
  const notes = document.getElementById('in-notes').value.trim();
  if (!name || !result) { alert('Please enter a name and select an outcome.'); return; }
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayKey = dayNames[now.getDay()];
  state.calls.unshift({ name, phone, area, result, temp, notes, time, date: getToday(), dayKey });
  state.allTimeCalls++;
  if (result === 'booked') state.allTimeBooked++;
  if (state.weekData[dayKey] !== undefined) state.weekData[dayKey]++;
  if ((result === 'booked' || result === 'quote') && state.weekQuotes[dayKey] !== undefined) state.weekQuotes[dayKey]++;
  ['in-name','in-phone','in-area','in-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('in-result').value = '';
  document.getElementById('in-temp').value = '';
  renderAll();
  saveState();
}

function renderCallLog() {
  const tbody = document.getElementById('call-tbody');
  const tc = todayCalls();
  if (tc.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:var(--text3);padding:16px 12px;text-align:center;">No calls logged yet — start dialing!</td></tr>';
    return;
  }
  tbody.innerHTML = tc.map(c => {
    const outcomeMap = { booked:'b-booked', quote:'b-quote', callback:'b-cb', voicemail:'b-vm', 'not-interested':'b-no', 'no-answer':'b-no' };
    const tempMap = { hot:'b-hot', warm:'b-warm', cold:'b-cold' };
    return `<tr>
      <td style="color:var(--text3)">${c.time}</td>
      <td style="font-weight:600">${c.name}</td>
      <td style="color:var(--text2)">${c.phone || '—'}</td>
      <td>${c.area || '—'}</td>
      <td><span class="badge ${outcomeMap[c.result] || 'b-no'}">${c.result.replace(/-/g,' ')}</span></td>
      <td>${c.temp ? '<span class="badge '+tempMap[c.temp]+'">'+c.temp.charAt(0).toUpperCase()+c.temp.slice(1)+'</span>' : '—'}</td>
      <td style="color:var(--text2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.notes || '—'}</td>
    </tr>`;
  }).join('');
}

function updateMetrics() {
  const tc = todayCalls();
  const calls = tc.length;
  const quotes = tc.filter(c => c.result==='quote'||c.result==='booked').length;
  const vms = tc.filter(c => c.result==='voicemail').length;
  const booked = tc.filter(c => c.result==='booked').length;
  const openQuotes = tc.filter(c => c.result==='quote').length;
  document.getElementById('m-calls').textContent = calls;
  document.getElementById('m-quotes').textContent = quotes;
  const rate = calls>0?Math.round(quotes/calls*100):null;
  const convEl = document.getElementById('m-conv');
  convEl.textContent = rate!==null?rate+'%':'—';
  convEl.className = 'metric-value '+(rate===null?'':rate>=15?'good':rate>=8?'warn':'bad');
  document.getElementById('m-pipe').textContent = '$'+(openQuotes*210).toLocaleString();
  const pct = v=>Math.min(100,Math.round(v));
  const cp = pct(calls/30*100), vp = pct(vms/10*100), bp = pct(booked/2*100);
  document.getElementById('gl-calls').textContent = calls+' / 30';
  document.getElementById('gb-calls').style.width = cp+'%';
  document.getElementById('gb-calls').className='goal-bar-fill'+(cp>=100?' complete':'');
  document.getElementById('gl-vm').textContent = vms+' / 10';
  document.getElementById('gb-vm').style.width = vp+'%';
  document.getElementById('gb-vm').className='goal-bar-fill'+(vp>=100?' complete':'');
  document.getElementById('gl-booked').textContent = booked+' / 2';
  document.getElementById('gb-booked').style.width = bp+'%';
  document.getElementById('gb-booked').className='goal-bar-fill'+(bp>=100?' complete':'');
  document.getElementById('at-calls').textContent=state.allTimeCalls;
  document.getElementById('at-booked').textContent=state.allTimeBooked;
  document.getElementById('at-rate').textContent=state.allTimeCalls>0?Math.round(state.allTimeBooked/state.allTimeCalls*100)+'%':'—';
}

function renderFollowUps() {
  const el=document.getElementById('fu-list');
  if(state.followUps.length===0){el.innerHTML='<div style="color:var(--text3);font-size:12px;padding:10px 0">No follow-ups queued. Add one below.</div>'; return;}
  const dueClass={today:'due-today', tomorrow:'due-soon','3days':'due-ok', week:'due-ok'};
  const dueLabel={today:'Due today', tomorrow:'Tomorrow','3days':'In 3 days', week:'This week'};
  el.innerHTML=state.followUps.map(fu=>`
    <div class="fu-item">
      <div>
        <div class="fu-name">${fu.name}</div>
        <div class="fu-detail">${fu.detail}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span class="${dueClass[fu.due]||'due-ok'}">${dueLabel[fu.due]||fu.due}</span>
        <button class="fu-done-btn" onclick="removeFU(${fu.id})">Done</button>
      </div>
    </div>
  `).join('');
}

function addFollowUp() {
  const name=document.getElementById('fu-name').value.trim();
  const detail=document.getElementById('fu-detail').value.trim();
  const due=document.getElementById('fu-due').value;
  if(!name || !detail){alert('Enter name and details'); return;}
  state.followUps.push({id:state.nextFuId++, name, detail, due});
  document.getElementById('fu-name').value=''; document.getElementById('fu-detail').value='';
  renderFollowUps(); saveState();
}

function removeFU(id) {
  state.followUps=state.followUps.filter(fu=>fu.id!==id);
  renderFollowUps(); saveState();
}

function toggleCheck(idx, el) {
  el.parentElement.classList.toggle('done', el.checked);
}

function resetDay() {
  if(confirm('Reset today\'s calls?')) {
    state.calls=state.calls.filter(c=>c.date!==getToday());
    renderAll(); saveState();
  }
}

function clearAll() {
  if(confirm('Clear all data?')) {
    state={calls:[],followUps:[],allTimeCalls:0,allTimeBooked:0,weekData:{Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0,Sun:0},weekQuotes:{Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0,Sun:0},nextFuId:1};
    renderAll(); saveState();
  }
}

function renderAll(){
  renderCallLog(); updateMetrics(); renderFollowUps(); updateCharts();
}

// --- CHARTS ---
let weekChart=null, outcomeChart=null;
function initCharts(){
  const ctxWeek=document.getElementById('weekChart').getContext('2d');
  weekChart=new Chart(ctxWeek,{type:'bar',data:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],datasets:[{label:'Calls',data:Object.values(state.weekData),backgroundColor:'#378ADD'},{label:'Quotes/Booked',data:Object.values(state.weekQuotes),backgroundColor:'#3B6D11'}]},options:{responsive:true,plugins:{legend:{display:false}}}});
  const ctxOutcome=document.getElementById('outcomeChart').getContext('2d');
  outcomeChart=new Chart(ctxOutcome,{type:'doughnut',data:{labels:['Booked','Quote sent','Callback','Voicemail','Not interested','No answer'],datasets:[{data:[0,0,0,0,0,0],backgroundColor:['#3B6D11','#854F0B','#378ADD','#8a8a8a','#A32D2D','#5F5E5A']}]},options:{responsive:true}});
}
function updateCharts(){
  if(!weekChart||!outcomeChart)return;
  weekChart.data.datasets[0].data=Object.values(state.weekData);
  weekChart.data.datasets[1].data=Object.values(state.weekQuotes);
  weekChart.update();
  const counts={booked:0,quote:0,callback:0,voicemail:0,'not-interested':0,'no-answer':0};
  todayCalls().forEach(c=>{counts[c.result]++;});
  outcomeChart.data.datasets[0].data=Object.values(counts);
  outcomeChart.update();
}

// --- Tabs ---
function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.script-panel').forEach(p=>p.classList.remove('visible'));
  document.getElementById('panel-'+id).classList.add('visible');
}

// --- Init ---
loadState();
renderAll();
initCharts();
</script>
</body>
</html>
